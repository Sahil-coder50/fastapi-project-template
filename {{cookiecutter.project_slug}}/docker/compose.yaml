name: {{ cookiecutter.project_name }}

services:
  postgres:
    image: postgres:17
    restart: unless-stopped

    environment:
      - POSTGRES_DB=db
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s


  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile

    entrypoint: /{{ cookiecutter.project_name }}/docker/entrypoint.sh

    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload

    environment:
      RUN_MIGRATIONS: "1"

    env_file:
      - ../.env

    depends_on:
      postgres:
        condition: service_healthy

    ports:
      - "8000:8000"

    volumes:
      - ../:/app

    restart: unless-stopped

volumes:
  postgres_data: